<!DOCTYPE html>
<html lang="ro">
    


<!--dkmdmkd-->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>




<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Weather App</title>
    <meta name="description" content="Aplicatie meteo">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <h2 class="logo">
  Weather

  <svg xmlns="http://w3.org" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient pentru fundalul soarelui -->
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD166" />
      <stop offset="100%" stop-color="#F9A03F" />
    </linearGradient>

    <!-- Gradient pentru nor -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E1E5EE" />
    </linearGradient>

    <!-- Umbră pentru elemente -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Soare în fundal -->
  <circle cx="220" cy="220" r="110" fill="url(#sunGradient)" filter="url(#dropShadow)" />

  <!-- Nor în prim-plan -->
  <path d="M 330,300 
           A 65,65 0 0,0 270,180 
           A 55,55 0 0,0 162,195 
           A 60,60 0 0,0 150,300 
           Z" 
        fill="url(#cloudGradient)" 
        filter="url(#dropShadow)" />
</svg>

</h2>
        <div class="oras">
            <input type="text" id="cityInput" placeholder="Cauta oras...">
            <button id="locatie">Locatia ta</button>
            <button id="cautare">Cauta</button>
        </div>
    </nav>

    <!-- Weather Card -->
    <div class="weather-card">
        <h1 id="nume-oras">_ _</h1>

        <img id="icon" src="" alt="weather icon">

        <h1 id="temperatura">_ _ °C</h1>

        <p id="descriere">_ _ _</p>

        <div class="details">

    <div class="detail-box">
        <svg xmlns="http://w3.org" viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
</svg>
        <span id="humidity">--</span>
    </div>

    <div class="detail-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="30" stroke-linecap="round" stroke-linejoin="round">
  <path d="M64 128h192M64 256h320M64 384h192M352 128c35.35 0 64 28.65 64 64s-28.65 64-64 64"/>
</svg>
        <span id="wind">--</span>
    </div>

</div>
    </div>

    <!-- Forecast -->
    <h1 id="Prognoza">Prognoza pe 7 zile</h1>
 
    <div class="forecast-wrapper">

  <button class="nav-btn left" id="btnLeft">‹</button>

    <div class="forecast-container">
    <div class="forecast" id="forecast"></div>
      
    <button class="nav-btn right" id="btnRight">›</button>

</div>
  
  <div class="map-container">
  <h2>Harta precipitațiilor</h2>
  <div id="weather-map"></div>
</div>

    <script src="script.js"></script>

</body>
</html>
