<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Weather App</title>
    <meta name="description" content="Aplicatie meteo">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <h2>Weather</h2>
        <div class="oras">
            <input type="text" id="cityInput" placeholder="Cauta oras...">
            <button id="locatie">Locatia ta</button>
            <button id="cautare">Cauta</button>
        </div>
    </nav>

    <!-- Weather Card -->
    <div class="weather-card">
        <h1 id="nume-oras">_ _</h1>

        <img id="icon" src="" alt="weather icon">

        <h1 id="temperatura">_ _ °C</h1>

        <p id="descriere">_ _ _</p>

        <div class="details">

    <div class="detail-box">
        💧
        <span id="humidity">--</span>
    </div>

    <div class="detail-box">
        💨
        <span id="wind">--</span>
    </div>

</div>
    </div>

    <!-- Forecast -->
    <h1 id="Prognoza">Prognoza pe 5 zile</h1>
 
    <div class="forecast-container">
    <div class="forecast" id="forecast"></div>
    
  <!-- Script -->
    <script src="script.js"></script>

</body>
</html>
